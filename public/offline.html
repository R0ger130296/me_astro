<!doctype html>
<html lang="es-EC">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Sin conexión · Roger Cedeño</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f8fafc; color: #0f172a; }
      main { width: min(100%, 520px); padding: 32px; border: 1px solid #e2e8f0; border-radius: 24px; background: #fff; box-shadow: 0 20px 50px rgba(15, 23, 42, .08); }
      p { line-height: 1.65; color: #475569; }
      a { display: inline-flex; min-height: 48px; align-items: center; justify-content: center; margin-top: 12px; padding: 0 18px; border-radius: 12px; background: #0f172a; color: #fff; font-weight: 700; text-decoration: none; }
      @media (prefers-color-scheme: dark) {
        body { background: #020617; color: #f8fafc; }
        main { background: #0f172a; border-color: #334155; }
        p { color: #cbd5e1; }
        a { background: #f8fafc; color: #0f172a; }
      }
    </style>
  </head>
  <body>
    <main>
      <p style="margin:0;font-size:.75rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase">Modo offline</p>
      <h1>Ahora mismo no tienes conexión.</h1>
      <p>La información principal del portafolio queda disponible cuando ya fue visitada. Vuelve a intentar cuando recuperes internet.</p>
      <a href="/">Reintentar</a>
    </main>
  </body>
</html>
