name: Apply technology brand icons

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-brand-icons.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace generic framework icons
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'src/pages/index.astro';
          let source = fs.readFileSync(path, 'utf8');

          source = source.replace(
            "import '../styles/nav-fix.css';\n",
            "import '../styles/nav-fix.css';\nimport BrandIcon from '../components/BrandIcon.astro';\nimport { siAstro, siDocker, siDotnet, siExpo, siFirebase, siGit, siGraphql, siMicrosoftazure, siMicrosoftsqlserver, siNodedotjs, siReact, siTailwindcss, siTypescript } from 'simple-icons';\n"
          );

          const removeImports = ['Atom','CarFront','Cloud','Container','Database','Flame','GitBranch','Network','Smartphone','Sparkles','WalletCards','Wind','Braces','Box'];
          for (const name of removeImports) {
            source = source.replace(new RegExp(`\\n  ${name},`, 'g'), '');
          }

          const projectIcons = {
            'WalletCards': 'siReact',
            'CarFront': 'siDotnet',
            'Smartphone': 'siExpo',
            'Network': 'siGraphql',
            'Sparkles': 'siAstro',
          };
          for (const [oldIcon, newIcon] of Object.entries(projectIcons)) {
            source = source.replace(`icon: ${oldIcon},`, `icon: ${newIcon},`);
          }

          source = source.replace(
            /const technologies = \[[\s\S]*?\n\];/,
            `const technologies = [\n  { name: 'React', icon: siReact },\n  { name: 'TypeScript', icon: siTypescript },\n  { name: '.NET', icon: siDotnet },\n  { name: 'Node.js', icon: siNodedotjs },\n  { name: 'Astro', icon: siAstro },\n  { name: 'Azure', icon: siMicrosoftazure },\n  { name: 'SQL Server', icon: siMicrosoftsqlserver },\n  { name: 'Firebase', icon: siFirebase },\n  { name: 'Docker', icon: siDocker },\n  { name: 'Git', icon: siGit },\n  { name: 'Tailwind CSS', icon: siTailwindcss },\n  { name: 'GraphQL', icon: siGraphql },\n];`
          );

          source = source.replace(
            /<div class="tech-pills" aria-label="Tecnologías principales">[\s\S]*?<\/div>/,
            `<div class="tech-pills" aria-label="Tecnologías principales">\n            <span><BrandIcon icon={siReact} size={16} />React</span>\n            <span><BrandIcon icon={siDotnet} size={16} />.NET</span>\n            <span><BrandIcon icon={siTypescript} size={16} />TypeScript</span>\n            <span><BrandIcon icon={siMicrosoftazure} size={16} />Azure</span>\n            <span><BrandIcon icon={siAstro} size={16} />Astro</span>\n          </div>`
          );

          source = source.replace(
            /\{projects\.map\(\(project\) => \{[\s\S]*?const ProjectIcon = project\.icon;[\s\S]*?return \(/,
            `{projects.map((project) => (`
          );
          source = source.replace(
            /<ProjectIcon size=\{22\} aria-hidden="true" \/>/g,
            `<BrandIcon icon={project.icon} size={22} label={project.title} />`
          );
          source = source.replace(/\n\s*\);\n\s*\}\)\}/, '\n          ))}');

          source = source.replace(
            /\{technologies\.map\(\(\{ name, icon \}\) => \{[\s\S]*?return <div><TechnologyIcon size=\{23\} aria-hidden="true" \/><span>\{name\}<\/span><\/div>;[\s\S]*?\}\)\}/,
            `{technologies.map(({ name, icon }) => (\n              <div><BrandIcon icon={icon} size={24} label={name} /><span>{name}</span></div>\n            ))}`
          );

          fs.writeFileSync(path, source);
          NODE
          rm .github/workflows/apply-brand-icons.yml
      - name: Commit brand icon system
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/index.astro .github/workflows/apply-brand-icons.yml
          git commit -m "refactor: use official technology brand icons"
          git push origin HEAD:main
