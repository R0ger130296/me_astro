name: Quality

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint > eslint.log 2>&1

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail when lint has errors
        if: steps.lint.outcome == 'failure'
        run: |
          tail -n 160 eslint.log
          exit 1

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
